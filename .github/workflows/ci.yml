name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint -w apps/web

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Cache Prisma engines
        uses: actions/cache@v4
        with:
          path: ~/.cache/prisma
          key: prisma-engines-${{ runner.os }}-${{ hashFiles('packages/db/prisma/schema.prisma') }}
          restore-keys: |
            prisma-engines-${{ runner.os }}-
      - run: npm ci
      - run: npm run build:packages
      - run: npm run typecheck

  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Cache Prisma engines
        uses: actions/cache@v4
        with:
          path: ~/.cache/prisma
          key: prisma-engines-${{ runner.os }}-${{ hashFiles('packages/db/prisma/schema.prisma') }}
          restore-keys: |
            prisma-engines-${{ runner.os }}-
      - run: npm ci
      - run: npm run generate -w packages/db
      - run: npm run test:api

  build:
    needs: [lint, typecheck, test-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Cache Prisma engines
        uses: actions/cache@v4
        with:
          path: ~/.cache/prisma
          key: prisma-engines-${{ runner.os }}-${{ hashFiles('packages/db/prisma/schema.prisma') }}
          restore-keys: |
            prisma-engines-${{ runner.os }}-
      - run: npm ci --include=optional
      - run: npm run build
